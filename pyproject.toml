[tool.ruff]
line-length = 100
target-version = "py39"
fix = true

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "A",
    "B",
    "C4",
    "I",
    "ISC",
    "N",
    "RET",
    "SIM",
    "UP",
    "YTT",
    "D",
    "DOC",
    "CPY",
    "ARG",
    "ASYNC",
    "BLE",
    "RSE",
    "TRY",
    "DTZ",
    "ERA",
    "FIX",
    "FLY",
    "FURB",
    "PIE",
    "SLF",
    "G",
    "LOG",
    "INP",
    "TID",
    "PERF",
    "T10",
    "T20",
    "PGH",
    "PLE",
    "PLW",
    "PTH",
    "RUF",
    "PLR0124",
    "PLR0133",
    "PLR1711",
    "PLR1714",
    "PLR1716",
    "PLR1722",
    "PLR1730",
    "PLR1733",
    "PLR1736",
    "PLR2004",
    "PLR2044",
    "PLR5501",
    "E501",
]
ignore = [
    "TRY003",
    "TRY300",
    "TRY301",
    "TRY400",
    "G004",
    "RUF100",
    "D105",
    "D107",
    "D203",
    "D212",
    "UP007",
    "UP045",
    "RUF013",
]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = [
    "INP001",
]

[tool.mypy]
python_version = "3.9"
strict = true
warn_unreachable = true
ignore_missing_imports = true
show_column_numbers = true
show_error_codes = true

[tool.bandit]
exclude_dirs = [
    "tests",
]
skips = []

[tool.pytest.ini_options]
minversion = "6.0"
testpaths = [
    "tests",
]
addopts = [
    "-ra",
    "--import-mode=importlib",
    "--strict-markers",
    "--strict-config",
]
xfail_strict = true
filterwarnings = [
    "error",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow tests",
]

[tool.coverage.run]
branch = true
source = [
    "src",
]
omit = [
    "*/tests/*",
]

[tool.coverage.report]
show_missing = true
precision = 1
exclude_also = [
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
