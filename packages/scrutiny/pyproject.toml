[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "ks-scrutiny"
version = "4.0.1"
description = "Unified code quality orchestration; linters, formatters, type checkers, and security analyzers in one CLI"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
    { name = "KikiSuho", email = "suho@kikisuho.com" },
]
keywords = [
    "code quality",
    "linting",
    "formatting",
    "type checking",
    "security",
    "ruff",
    "mypy",
    "bandit",
    "radon",
    "cli",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "tomli>=1.1.0; python_version < '3.11'",
    "tomli-w>=1.0.0",
    "psutil>=5.9.0",
]

[project.urls]
Homepage = "https://github.com/KikiSuho/ks-tools"
Repository = "https://github.com/KikiSuho/ks-tools"
Issues = "https://github.com/KikiSuho/ks-tools/issues"

[project.optional-dependencies]
ruff = ["ruff>=0.4.0"]
mypy = ["mypy>=1.0"]
radon = ["radon>=6.0"]
bandit = ["bandit>=1.7"]
all = [
    "ks-scrutiny[ruff]",
    "ks-scrutiny[mypy]",
    "ks-scrutiny[radon]",
    "ks-scrutiny[bandit]",
]
dev = [
    "ks-scrutiny[all]",
    "pytest>=7.0",
    "pytest-cov",
]

[project.scripts]
scrutiny = "scrutiny.main:main"

[tool.hatch.build.targets.wheel]
packages = [
    "src/scrutiny",
]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "README.md",
    "CHANGELOG.md",
    "ROADMAP.md",
    "LICENSE",
]

[tool.pytest.ini_options]
pythonpath = [
    "src",
    "tests",
]

[tool.mypy]
python_version = "3.9"
strict = true
warn_unreachable = true
ignore_missing_imports = true
show_column_numbers = true
show_error_codes = true

[tool.bandit]
exclude_dirs = [
    "tests",
]
skips = []

[tool.ruff]
line-length = 100
target-version = "py39"
fix = true

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "A",
    "B",
    "C4",
    "I",
    "ISC",
    "N",
    "RET",
    "SIM",
    "UP",
    "YTT",
    "D",
    "DOC",
    "CPY",
    "ARG",
    "ASYNC",
    "BLE",
    "RSE",
    "TRY",
    "DTZ",
    "ERA",
    "FIX",
    "FLY",
    "FURB",
    "PIE",
    "SLF",
    "G",
    "LOG",
    "INP",
    "TID",
    "PERF",
    "T10",
    "T20",
    "PGH",
    "PLE",
    "PLW",
    "PTH",
    "RUF",
    "PLR0124",
    "PLR0133",
    "PLR1711",
    "PLR1714",
    "PLR1716",
    "PLR1722",
    "PLR1730",
    "PLR1733",
    "PLR1736",
    "PLR2004",
    "PLR2044",
    "PLR5501",
    "E501",
]
ignore = [
    "TRY003",
    "TRY300",
    "TRY301",
    "TRY400",
    "G004",
    "RUF100",
    "D105",
    "D107",
    "D203",
    "D212",
    "UP007",
    "UP045",
    "RUF013",
]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = [
    "INP001",
]