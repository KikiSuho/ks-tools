[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "scrutiny"
version = "0.1.0"
description = "Unified code quality orchestration; linters, formatters, type checkers, and security analyzers in one CLI"
requires-python = ">=3.9"
license = "MIT"
dependencies = [
    "tomli>=1.1.0; python_version < '3.11'",
    "tomli-w>=1.0.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
ruff = ["ruff>=0.4.0"]
mypy = ["mypy>=1.0"]
radon = ["radon>=6.0"]
bandit = ["bandit>=1.7"]
all = [
    "scrutiny[ruff]",
    "scrutiny[mypy]",
    "scrutiny[radon]",
    "scrutiny[bandit]",
]
dev = [
    "scrutiny[all]",
    "pytest>=7.0",
    "pytest-cov",
]

[project.scripts]
scrutiny = "scrutiny.main:main"

[tool.hatch.build.targets.wheel]
packages = [
    "src/scrutiny",
]

[tool.pytest.ini_options]
pythonpath = [
    "src",
    "tests",
]

[tool.mypy]
python_version = "3.9"
strict = true
warn_unreachable = true
ignore_missing_imports = true
show_column_numbers = true
show_error_codes = true

[tool.bandit]
exclude_dirs = [
    "tests",
]
skips = []

[tool.ruff]
line-length = 100
target-version = "py39"
fix = true

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "A",
    "B",
    "C4",
    "I",
    "ISC",
    "N",
    "RET",
    "SIM",
    "UP",
    "YTT",
    "D",
    "DOC",
    "CPY",
    "ARG",
    "ASYNC",
    "BLE",
    "RSE",
    "TRY",
    "DTZ",
    "ERA",
    "FIX",
    "FLY",
    "FURB",
    "PIE",
    "SLF",
    "G",
    "LOG",
    "INP",
    "TID",
    "PERF",
    "T10",
    "T20",
    "PGH",
    "PLE",
    "PLW",
    "PTH",
    "RUF",
    "PLR0124",
    "PLR0133",
    "PLR1711",
    "PLR1714",
    "PLR1716",
    "PLR1722",
    "PLR1730",
    "PLR1733",
    "PLR1736",
    "PLR2004",
    "PLR2044",
    "PLR5501",
    "E501",
]
ignore = [
    "TRY003",
    "TRY300",
    "TRY301",
    "TRY400",
    "G004",
    "RUF100",
    "D105",
    "D107",
    "D203",
    "D212",
    "UP007",
    "UP045",
    "RUF013",
]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = [
    "INP001",
]
